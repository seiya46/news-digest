name: Update News Digest

on:
  schedule:
    - cron: "0 21 * * *"  # 21:00 UTC = 06:00 JST（朝）
    - cron: "0 3 * * *"   # 03:00 UTC = 12:00 JST（昼）
    - cron: "0 9 * * *"   # 09:00 UTC = 18:00 JST（夕）
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: ニュース取得とレポート生成
        run: python fetch_news.py

      - name: 変更があればコミット&プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html reports/
          git diff --cached --quiet || git commit -m "Update news digest"
          git push
